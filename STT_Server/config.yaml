# STT Server configuration

server:
  host: "127.0.0.1"
  port: 9000

model:
  # Whisper model. A size name downloads automatically on first run:
  #   tiny  < base < small < medium < large-v3   (bigger = better but slower / larger download)
  # You can also point this at a local folder or a HuggingFace model id.
  # "small" is fast and fine to start with; "medium" or "large-v3" are more accurate.
  name: "small"
  language: "de"        # recognition language: de, en, fr, es, ru, ja, zh, ...
  compute_type: "int8"  # int8 = CPU-friendly and fast
  cpu_threads: 8        # adjust to your CPU
  beam_size: 5

vad:
  enabled: true                 # voice activity detection trims silence
  min_silence_duration_ms: 500

logging:
  level: "INFO"
  dir: "./logs"
  max_bytes: 5242880
  backup_count: 3
